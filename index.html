<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação do Candidato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <h1>Validação do candidato</h1>

    <div class="form-group">
        <label for="idade">Idade</label>
        <input type="number" id="idade" placeholder="Ex: 30">
    </div>

    <div class="form-group">
        <label for="horas">Horas de voo</label>
        <input type="number" id="horas" placeholder="Ex: 1500">
    </div>

    <div class="form-group">
        <label for="nota">Nota</label>
        <input type="number" id="nota" placeholder="Ex: 9">
    </div>

    <button onclick="Validar()">Validar</button>

    <p id="Resultado"></p>
</div>

<script src="JavaScript.js"></script>

</body>
</html>
